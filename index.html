<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IserToolkit</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        // --- KODE UTAMA ANDA DI SINI ---
        
        function App() {
            return (
                <div>
                    <h1>IserToolkit</h1>
                    <p>Selamat! Toolkit interaktif Anda sudah berhasil muncul.</p>
                </div>
            );
        }

        // --- JANGAN UBAH BAGIAN INI ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
