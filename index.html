<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IserToolkit</title>
    <script src="https://esm.sh/react@18.3.1"></script>
    <script src="https://esm.sh/react-dom@18.3.1/client"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin: 0; background: #0A0A0F;">
    <div id="root"></div>

    <script type="text/babel">
        // Mengambil kode dari file Anda
        fetch('./src/IserToolkit.jsx')
            .then(res => res.text())
            .then(jsxCode => {
                // Proses JSX jadi JS
                const transformed = Babel.transform(jsxCode, { presets: ['react'] }).code;
                
                // Eksekusi kode
                const script = document.createElement('script');
                script.innerHTML = transformed + '; const root = ReactDOM.createRoot(document.getElementById("root")); root.render(React.createElement(IserToolkit.default || IserToolkit));';
                document.body.appendChild(script);
            })
            .catch(err => console.error("Gagal load IserToolkit.jsx:", err));
    </script>
</body>
</html>
