<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IserToolkit</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin: 0; background: #0A0A0F;">
    <div id="root"></div>

    <script type="text/babel" src="src/IserToolkit.jsx"></script>
    
    <script type="text/babel">
        const { createRoot } = ReactDOM;
        const root = createRoot(document.getElementById('root'));
        
        // Pengecekan agar tidak error kalau file belum ter-load
        if (typeof IserToolkit !== 'undefined') {
            root.render(React.createElement(IserToolkit.default || IserToolkit));
        } else {
            console.error("File IserToolkit.jsx tidak ditemukan di path src/IserToolkit.jsx");
        }
    </script>
</body>
</html>
